<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="card-title mb-0">{{ pet.id ? 'Editar Pet - Amigo Fiel' : 'Cadastro de Pet - Amigo Fiel' }}</h3>
    </div>
    <div class="card-body">
      <form class="row g-3" (ngSubmit)="onSubmit()">
        <div class="col-md-6 mb-3">
          <label for="nome" class="form-label">Nome do Pet</label>
          <input type="text" id="nome" name="nome" [(ngModel)]="pet.nome" class="form-control" placeholder="Ex: Thor" required>
        </div>

        <div class="col-md-6 mb-3">
          <label for="especie" class="form-label">Espécie</label>
          <select id="especie" name="especie" [(ngModel)]="pet.especie" class="form-select" required>
            <option value="" disabled>Selecione...</option>
            <option value="Cachorro">Cachorro</option>
            <option value="Gato">Gato</option>
            <option value="Ave">Ave</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="idade" class="form-label">Idade (anos)</label>
          <input type="number" id="idade" name="idade" [(ngModel)]="pet.idade" class="form-control" placeholder="Ex: 3" required>
        </div>

        <div class="col-md-6 mb-3">
          <label for="telefone" class="form-label">Telefone do Dono</label>
          <input 
            type="text" 
            id="telefone" 
            name="telefoneDono"
            [(ngModel)]="pet.telefoneDono"
            class="form-control" 
            mask="(00) 00000-0000" 
            placeholder="(00) 00000-0000"
            [required]="true">
        </div>

        <div class="col-12 d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" (click)="cancelar.emit()">Cancelar</button>
          <button type="submit" class="btn btn-primary">{{ pet.id ? 'Atualizar Pet' : 'Salvar Pet' }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
