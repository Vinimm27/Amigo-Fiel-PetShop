<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>
      Pets Cadastrados 
      <span class="badge bg-secondary">{{ total() }}</span>
    </h2>
    <button class="btn btn-success" (click)="novo.emit()">
      <i class="bi bi-plus-lg"></i> Novo Cadastro
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover vertical-align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nome do Pet</th>
          <th>Espécie</th>
          <th>Idade</th>
          <th>Telefone do Dono</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (animal of animais(); track animal.id) {
          <tr>
            <td>{{ animal.id }}</td>
            <td><strong>{{ animal.nome }}</strong></td>
            <td>{{ animal.especie }}</td>
            <td>{{ animal.idade }} anos</td>
            <td>{{ animal.telefoneDono }}</td>
            <td class="text-center">
              <button class="btn btn-warning btn-sm me-2" (click)="editarPet.emit(animal)">
                <i class="bi bi-pencil"></i> Editar
              </button>
              <button class="btn btn-danger btn-sm" (click)="remover(animal.id)">
                <i class="bi bi-trash"></i> Excluir
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="text-center text-muted p-4">
              Nenhum pet encontrado no sistema.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
